services:
  selenium:
    image: selenium/standalone-chrome:latest
    shm_size: 2gb
    ports:
      - "4444:4444"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:4444/status > /dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  scraper:
    image: ghcr.io/luiggi33/tibros-scraper:latest
    depends_on:
      selenium:
        condition: service_healthy
    env_file: tibros.env
    environment:
      SELENIUM_REMOTE_URL: http://selenium:4444
      TIBROS_SCRAPER_STATE_PATH: /data/tibros_scraper_state.json
    volumes:
      - tibros_scraper_state:/data

volumes:
  tibros_scraper_state: